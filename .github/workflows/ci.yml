name: Titanic CI Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  train-build-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r MLProject/requirements.txt

      - name: Check Environment
        run: |
          python --version
          pip list

      - name: Run MLflow Project
        env:
          MLFLOW_TRACKING_URI: https://dagshub.com/firlanpamungkas/titanic-mlflow.mlflow
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          cd MLProject
          mlflow run . --env-manager local

      - name: Read Run ID
        run: |
          if [ ! -f MLProject/run_id.txt ]; then
            echo "run_id.txt not found!"
            exit 1
          fi

          RUN_ID=$(cat MLProject/run_id.txt)
          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV
          echo "Run ID: $RUN_ID"

      - name: Download Artifact
        env:
          MLFLOW_TRACKING_URI: https://dagshub.com/firlanpamungkas/titanic-mlflow.mlflow
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          mlflow artifacts download \
            --run-id "$RUN_ID" \
            -d downloaded_artifacts

      - name: Inspect Artifact Structure
        run: |
          echo "=== Artifact Structure ==="
          ls -R downloaded_artifacts

      - name: Upload Artifact to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: titanic-model
          path: downloaded_artifacts

      - name: Locate MLflow Model
        run: |
          MODEL_PATH=$(find downloaded_artifacts -name MLmodel | head -n 1 | xargs dirname)

          echo "MODEL_PATH=$MODEL_PATH" >> $GITHUB_ENV

          echo "Detected Model Path:"
          echo "$MODEL_PATH"

      - name: Build Docker Image with MLflow
        continue-on-error: true
        run: |
            mlflow models build-docker \
            -m "$MODEL_PATH" \
            -n titanic-model

      - name: Build Docker Image Fallback
        run: |
            docker build -t titanic-model:latest .

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Tag Docker Image
        run: |
          docker tag titanic-model firlan/titanic-model:latest

      - name: Push Docker Image
        run: |
          docker push firlan/titanic-model:latest

      - name: Workflow Completed
        run: |
          echo "Training completed"
          echo "Artifact uploaded"
          echo "Docker image pushed"